[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
via_ir = true
optimizer = true
optimizer_runs = 1  # Lower = more optimized but slower compilation
remappings = [
    "src/=src/",
    '@openzeppelin/=lib/openzeppelin-contracts/'
]
fs_permissions = [
    { access = "read-write", path = "./.env" },
    { access = "read-write", path = "./.env.anvil" },
    { access = "read-write", path = "./.env.deployed" }
]


# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
